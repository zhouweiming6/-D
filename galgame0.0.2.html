<!DOCTYPE html>
<!-- 场景
傍晚 / 自习室
环境音：低、稳定、无情绪暗示

你只是坐着，她只是也在这里。

【画面】

她坐在你旁边隔了一个位置。
翻书的声音。
一段安静。
 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>夜里 · 显示器</title>

<style>
  body {
    margin: 0;
    background: #000;
    font-family: "Microsoft YaHei", sans-serif;
  }

  #game {
    width: 800px;
    height: 450px;
    margin: 40px auto;
    position: relative;
    background: radial-gradient(#111, #000);
    overflow: hidden;
  }

  #screenGlow {
    position: absolute;
    inset: 0;
    background: rgba(120,180,255,0.08);
    pointer-events: none;
     z-index: 1;
  }

  #textbox {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.65);
    color: #eaeaea;
    padding: 14px 18px;
    box-sizing: border-box;
     z-index: 2;
  }

  #name {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 6px;
  }

  #text {
    min-height: 60px;
    line-height: 1.6;
    font-size: 16px;
  }

  #next {
    position: absolute;
    right: 14px;
    bottom: 14px;
    background: none;
    border: none;
    color: #aaa;
    font-size: 18px;
    cursor: pointer;
  }

  #choices {
    margin-top: 10px;
  }

  .choice {
    display: block;
    margin-top: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: #eee;
    padding: 6px 10px;
    cursor: pointer;
    text-align: left;
  }

  .choice:hover {
    background: rgba(255,255,255,0.18);
  }


#characters {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;          /* 👈 比文字高 */  
}

#heroine {
  position: absolute;
  right: 40px;
  bottom: -10px;       /* 让她“压”进文字框 */
  height: 380px;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.6s ease;
  transform: translateY(12px);

}

/* 显示状态 */
#heroine.show {
  opacity: 1;
  transform: translateY(0);
}


</style>
</head>
<body>

<div id="game">
  <div id="screenGlow"></div>

  <div id="textbox">
    <div id="name">她</div>
    <div id="text"></div>
    <button id="next">▶</button>
    <div id="choices"></div>
  </div>

  <!-- 👇 角色层必须在 game 里 -->
  <div id="characters">
    <img id="heroine" src="file:///C:/Users/zhouw/Downloads/0ec11eab-702e-4bc6-b47a-d49dd29729d3.png">
  </div>
</div>



<script>

// 屏幕微光效果
  document.getElementById("screenGlow").style.opacity = 0.04;

// 角色显示控制
const heroine = document.getElementById("heroine");

// 显示角色
function showHeroine(src) {
  if (src) heroine.src = src;
  heroine.classList.add("show");
}

// 隐藏角色
function hideHeroine() {
  heroine.classList.remove("show");
}

// 打字机效果
let typeSpeed = 35; // A线 45，B线 25
let typing = false;
let typingTimer = null;
let fullText = "";
let charIndex = 0;

/* ========= 剧情数据 ========= */
const script = [
  { text: "在自习室里，翻书的声音十分清脆。她走到了你旁边隔了一个位置。" },
  // {show:"file:///C:/Users/zhouw/Downloads/0ec11eab-702e-4bc6-b47a-d49dd29729d3.png"},
  { 
    speaker: "她", text: "……这里，还有空位吗？" ,
    show:"file:///C:/Users/zhouw/Downloads/0ec11eab-702e-4bc6-b47a-d49dd29729d3.png"
  },
  { speaker: "她", text: "如果不方便的话，我可以换个地方。" },
  {
    choice: [
      { text: "没事，你坐吧。", jump: "A1" },
      { text: "（点点头）", jump: "A1" }
    ]
  }
];


//shｏｗ(); // 初始显示角色
function showLine(line) {
  clearInterval(typingTimer);

  if (line.show) showHeroine(line.show);
  if (line.hide) hideHeroine();
  if (line.show || line.hide) {
  nextBtn.style.display = "none";
  setTimeout(() => nextBtn.style.display = "block", 300);
}

// 打字机效果
  nameBox.textContent = line.speaker || "";
  textBox.textContent = "";

  if (!line.text) return;

  fullText = line.text;
  charIndex = 0;
  typing = true;

  typingTimer = setInterval(() => {
    charIndex++;
    textBox.textContent = fullText.slice(0, charIndex);

    if (charIndex >= fullText.length) {
      clearInterval(typingTimer);
      typing = false;
    }
  }, typeSpeed);
}



/* ========= 分支 ========= */
const branches = {
  A1: [
    { speaker: "她", text: "……" },
    { speaker: "她", text: "谢谢。" },

    //hide 角色
    { 
      text: "她坐下后，把包放到一旁，翻开了书。",
      hide: true
     },

    { text: "自习室里还有零散的几个人，各自低头做着自己的事。" },

    { text: "她翻着书，偶尔停一下，又继续往下看。" },

    //showc 角色
    { 
      speaker: "她", 
      show: "file:///C:/Users/zhouw/Downloads/0ec11eab-702e-4bc6-b47a-d49dd29729d3.png",
      text: "……" 
    },

    { speaker: "她", text: "这里比我想象中安静。" },

    //hide 角色
    { 
      text: "书页翻动的声音在安静的空间里显得很清楚。" 
      , hide: true},

    { text: "不知道过了多久。" },

    { text: "你回过神来时，周围的人好像空了一点。" },

    { 
      speaker: "她", text: "……咦。",
      show: "file:///C:/Users/zhouw/Downloads/0ec11eab-702e-4bc6-b47a-d49dd29729d3.png",
     },

    { speaker: "她", text: "刚才，这里是不是还有人？" },


    { choice: [
      { text: "好像有。", jump: "A2" },
      { text: "没注意。", jump: "A2" }
    ]}
  ],

    A2: [
      { speaker: "她", text: "是吗。" },

      { speaker: "她", text: "……可能是我记错了。" },

      { text: "她低下头，继续看书。" },

      { text: "又过了一会儿。" },

      { text: "自习室里只剩下你们2人。" },

      { text: "她翻了一页书。" },

      { text: "环境音变得很轻。" },

      { text: "这一段时间，没有人再进来。" },

// 后面某一章，她会说：

// 「你那天不是也觉得很安静吗？」

// 玩家回忆这段时会发现：
// 自己从没说过。
    ]
    


};
/* ========= 引擎 ========= */
let index = 0;
let current = script;

const nameBox = document.getElementById("name");
const textBox = document.getElementById("text");
const nextBtn = document.getElementById("next");
const choicesBox = document.getElementById("choices");

// function showLine(line) {
//   nameBox.textContent = line.speaker || "";
//   textBox.textContent = line.text || "";
// }

// 显示选项
function showChoices(choices) {
  nextBtn.style.display = "none";
  choicesBox.innerHTML = "";
  choices.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = c.text;
    btn.onclick = () => {
      choicesBox.innerHTML = "";
      nextBtn.style.display = "block";
      current = branches[c.jump];
      index = 0;
      showLine(current[index]);
    };
    choicesBox.appendChild(btn);
  });
}

// 下一句按钮
nextBtn.onclick = () => {
  // 如果正在打字：直接显示完整句
  if (typing) {
    clearInterval(typingTimer);
    textBox.textContent = fullText;
    typing = false;
    return;
  }

  index++;
  if (index >= current.length) return;

  const line = current[index];

  if (line.choice) {
    showChoices(line.choice);
  } else {
    showLine(line);
  }
};


/* 初始显示 */
showLine(script[0]);
</script>


</body>
</html>
